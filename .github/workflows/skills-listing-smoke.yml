name: skills-listing-smoke

# DEGRADED SCOPE — see scripts/validate_inventory.py header for details.
#
# This workflow asserts the STATIC inventory (9 skills + 2 agents + plugin.json
# schema) is intact. It does NOT invoke `copilot /skills list` because that
# command has no documented non-interactive surface as of Copilot CLI 1.0.57,
# and authenticating in CI would require a long-lived token.
#
# The loader-level smoke test that issue #3 originally envisioned is deferred
# upstream — see https://github.com/github/copilot-cli/issues/3546 for the
# adjacent loader-resolution work. When non-interactive `/skills list` lands,
# this workflow can be extended without changing its name or trigger surface.
#
# Complements `validate-frontmatter.yml`:
#   - validate-frontmatter — does each file PARSE and have valid fields?
#   - this workflow        — is the set of files what we expect?

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate inventory (9 skills + 2 agents + plugin.json schema)
        run: python scripts/validate_inventory.py
